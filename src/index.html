<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Veloce - AI Image Manager</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
  <style>
    /* アプリ全体のフォントを統一 (Windows 8.1 向け) */
    :root {
      font-family: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
    }
    /* フォーム要素も親のフォントを継承するように強制 */
    body, input, textarea, button, select, table {
      font-family: inherit;
      font-size: 1em;
    }
    
    /* ファイル一覧の罫線を設定 */
    #file-table {
      border-collapse: collapse;
      font-size: 0.9em;
    }
    #file-table th, #file-table td {
      border-right: 1px dotted var(--border-color);
      border-bottom: 1px solid var(--border-color);
    }
    #file-table th {
      font-weight: normal;
    }
    #file-table th:last-child, #file-table td:last-child {
      border-right: none;
    }

    /* フォルダツリー開閉用のOS準拠の三角形アイコン */
    .tree-toggle {
      display: inline-block;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 4px;
      border-color: transparent currentColor currentColor transparent;
      margin-right: 8px;
      vertical-align: middle;
      cursor: pointer;
      transform: rotate(-45deg);
      transition: transform 0.1s ease;
    }
    /* 展開時の右下が直角の二等辺三角形 */
    .tree-toggle.expanded {
      transform: rotate(0deg);
    }

    /* 中央ペインに移動した検索バーのレイアウト調整 */
    .center-search-wrapper {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .center-search-wrapper #search-container {
      flex: 1;
      max-width: none;
    }
    /* テキストボックス内への絶対配置をリセット */
    #search-clear-btn {
      position: static !important;
      transform: none !important;
    }

    /* オートコンプリート(自動補完)時の背景色・文字色の変化を防ぐ */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: var(--text-color) !important;
      transition: background-color 5000s ease-in-out 0s !important;
    }

    /* タイトルバーをタブの絶対配置の基準にする */
    .titlebar {
      position: relative;
    }

    /* タブコンテナ */
    #tab-container {
      position: absolute;
      bottom: 0;
      left: 8px;
      right: 190px; /* ウィンドウコントロールとタブ一覧ボタンの領域を避ける */
      height: 31px; /* タイトルバーの高さ - 1px */
      -webkit-app-region: no-drag; /* この領域はドラッグ不可にする */
      display: flex;
      align-items: flex-end;
      padding: 0 0 0 5px;
      overflow-x: auto;
      overflow-y: hidden;
    }
    #tab-container::-webkit-scrollbar { display: none; }

    .tab-item {
      display: flex;
      align-items: center;
      padding: 0 24px 0 10px;
      position: relative;
      height: 100%;
      background-color: transparent;
      border: 1px solid var(--border-color);
      border-bottom: none;
      border-top-left-radius: 4px;
      border-top-right-radius: 4px;
      margin-right: -1px; /* 境界線を重ねる */
      cursor: pointer;
      color: var(--text-color);
      opacity: 0.7;
      font-size: 13px;
      max-width: 250px;
      min-width: 120px;
      flex-shrink: 0;
      transition: all 0.15s ease;
    }

    /* ドラッグ＆ドロップ時のインジケーター（角丸の影響を受けない直線） */
    .tab-item.drag-over-left::after,
    .tab-item.drag-over-right::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 3px;
      background-color: var(--glow-gold);
      z-index: 10;
      pointer-events: none;
    }
    .tab-item.drag-over-left::after { left: -2px; }
    .tab-item.drag-over-right::after { right: -2px; }

    .tab-item:hover { 
      background-color: #162a2f; 
      opacity: 1; 
    }
    .tab-item.active {
      background-color: var(--accent-color);
      color: #fff;
      opacity: 1;
      border-color: var(--accent-color);
      z-index: 1;
    }
    @keyframes tabFadeIn {
      from { opacity: 0; transform: translateX(-15px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .tab-item.tab-fade-in {
      animation: tabFadeIn 0.25s ease-out;
    }
    .tab-item.tab-fade-out {
      opacity: 0 !important;
      transform: translateX(-15px) !important;
      min-width: 0 !important;
      width: 0 !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
      margin-right: 0 !important;
      border-width: 0 !important;
      transition: opacity 0.15s ease-out, transform 0.15s ease-out, width 0.2s ease-out, padding 0.2s ease-out, margin-right 0.2s ease-out, min-width 0.2s ease-out;
      pointer-events: none;
      overflow: hidden;
    }
    .tab-item.new-tab-btn {
      min-width: 32px;
      padding: 0;
      justify-content: center;
      border: none;
      border-radius: 0;
    }
    #new-tab-btn {
      position: sticky;
      right: 0;
      background-color: var(--bg-color); /* 重なったときに後ろのタブが透けないようにする */
      opacity: 1; /* .tab-item の透明度を上書きして完全に不透明にする */
      z-index: 2;
      -webkit-app-region: no-drag;
      margin-left: 1px; /* 左隣のタブの右枠線が隠れないように重なりを相殺 */
    }
    /* タブ追加ボタンの左側に、タブが下に潜り込むようなグラデーションを追加 */
    #new-tab-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -20px;
      width: 20px;
      height: 100%;
      background: linear-gradient(to right, transparent, var(--bg-color));
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    #new-tab-btn.is-overflowing::before {
      opacity: 1;
    }
    #new-tab-btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background-color: transparent;
      transition: background-color 0.15s ease;
      z-index: 0;
    }
    #new-tab-btn:hover::after {
      background-color: var(--accent-color);
    }
    #new-tab-btn svg {
      position: relative;
      z-index: 1;
    }
    #new-tab-btn:hover {
      color: #fff;
    }
    .tab-close-btn {
      position: absolute;
      right: 6px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.1s ease;
    }
    .tab-item:hover .tab-close-btn { opacity: 1; }
    .tab-close-btn:hover { background-color: rgba(255,255,255, 0.2); }
    
    .tab-label {
      display: block;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to right, black calc(100% - 20px), transparent 100%);
      mask-image: linear-gradient(to right, black calc(100% - 20px), transparent 100%);
    }

    /* ウィンドウコントロールボタンを右端に寄せる */
    .titlebar-controls {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      display: flex;
    }
  </style>
</head>
<body>
  <div id="border-overlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; box-sizing: border-box; border: 1px solid var(--accent-color); z-index: 9998; display: none;"></div>
  <div data-tauri-drag-region class="titlebar">
    <div id="tab-container">
      <div id="new-tab-btn" class="tab-item new-tab-btn">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </div>
    </div>
    <div class="titlebar-controls">
      <div class="titlebar-button" id="titlebar-tab-list" style="margin-right: 8px;">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
      <div class="titlebar-button" id="titlebar-minimize">
        <svg viewBox="0 0 10 10"><rect x="1" y="5" width="8" height="1" fill="currentColor"/></svg>
      </div>
      <div class="titlebar-button" id="titlebar-maximize">
        <svg viewBox="0 0 10 10"><rect x="1" y="1" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1"/></svg>
      </div>
      <div class="titlebar-button titlebar-close" id="titlebar-close">
        <svg viewBox="0 0 10 10"><polygon points="1,1 9,9" stroke="currentColor" stroke-width="1"/><polygon points="9,1 1,9" stroke="currentColor" stroke-width="1"/></svg>
      </div>
    </div>
  </div>
  <div class="app-content">
  <!-- 左ペイン: ディレクトリツリー等 -->
  <div id="left-pane">
    <div id="favorites-section">
      <ul id="favorites-list" class="tree-root"></ul>
    </div>
    <div class="resizer-h" id="resizer-left-pane"></div>
    <div id="directories-section">
      <div id="dir-tree"></div>
    </div>
  </div>

  <div class="resizer" id="resizer-left"></div>

  <!-- 中央ペイン: リストとグリッド -->
  <div id="center-pane">
    <div class="center-search-wrapper">
      <div id="search-container">
        <input type="text" id="search-bar" placeholder="検索 (ファイル名, プロンプト等 / カンマでAND検索)" spellcheck="false">
      </div>
      <button id="search-clear-btn" class="icon-btn"></button>
    </div>
	<div id="center-top">
	  <table id="file-table">
		<thead>
		  <tr>
			<th data-sort="name">名前</th>
			<th data-sort="ext">拡張子</th>
			<th data-sort="width">幅</th>
			<th data-sort="height">高さ</th>
			<th data-sort="size">サイズ</th>
			<th data-sort="mtime">更新日時</th>
		  </tr>
		</thead>
		<tbody id="file-list-body"></tbody>
	  </table>
	</div>
	<div class="resizer-h" id="resizer-center"></div>
	<div id="thumbnail-controls">
	  <label for="thumbnail-size-slider">サムネイル:</label>
	  <input type="range" id="thumbnail-size-slider" min="100" max="500" value="120">
	  <div class="control-divider"></div>
	  <button id="open-cache-btn" class="icon-btn" title="キャッシュフォルダを開く">
	    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
	      <path d="M2 20V5a2 2 0 0 1 2-2h4l2 2h10a2 2 0 0 1 2 2v3"></path>
	      <path d="M2 14h20l-2 6H4z"></path>
	    </svg>
	  </button>
	  <button id="clear-cache-btn" class="icon-btn" title="キャッシュ(サムネイル・メタデータ)をクリア">
	    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
	      <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path>
	      <path d="M22 21H7"></path>
	      <path d="m5 11 9 9"></path>
	    </svg>
	  </button>
	</div>
	<div id="center-bottom" class="thumbnail-grid"></div>
  </div>

  <div class="resizer" id="resizer-right"></div>

  <!-- 右ペイン: インスペクター -->
  <div id="right-pane">
    <div id="file-info-section">
      <div id="file-info-content" class="inspector-data">
        <div style="color: var(--text-color); opacity: 0.5; text-align: center; margin-top: 20px;">
          画像を選択してください
        </div>
      </div>
    </div>
    <div class="resizer-h" id="resizer-right-pane"></div>
    <div id="inspector-section">
      <div id="inspector-content" class="inspector-data">
        <div style="color: var(--text-color); opacity: 0.5; text-align: center; margin-top: 50px;">
          画像を選択すると詳細が表示されます
      </div>
    </div>
  </div>
  </div>

  <script type="module" src="/preload.js"></script>
  <script type="module" src="/renderer-state.js"></script>
  <script type="module" src="/renderer-ui.js"></script>
  <script type="module" src="/renderer.js"></script>

  <script>
    // 右クリック時にイベント伝播が止められていても、キャプチャフェーズで強制的にツールチップを消す
    window.addEventListener('contextmenu', () => {
      document.querySelector('.custom-tooltip.show')?.classList.remove('show');
    }, true);
  </script>

  <!-- トースト通知用コンテナ -->
  <div id="toast-container"></div>

  <div id="diff-modal" class="modal">
    <div class="modal-content" style="max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto;">
      <h2 style="margin-top: 0; color: var(--glow-gold);">プロンプト差分比較</h2>
      <div id="diff-container">
        </div>
    </div>
  </div>

  <div id="edit-favorite-modal" class="modal">
    <div class="modal-content" style="max-width: 400px; width: 90%;">
      <h2 style="margin-top: 0; color: var(--glow-gold); margin-bottom: 20px;">お気に入りを編集</h2>
      <div style="margin-bottom: 15px;">
        <label style="display:block; margin-bottom: 5px; color: var(--text-color); opacity: 0.8;">アイコン</label>
        <div id="fav-icon-selector" class="icon-selector"></div>
      </div>
      <div style="margin-bottom: 15px;">
        <label for="fav-name-input" style="display:block; margin-bottom: 5px; color: var(--text-color); opacity: 0.8;">名前</label>
        <input type="text" id="fav-name-input" class="dialog-input" placeholder="表示名">
      </div>
      <div style="margin-bottom: 25px;">
        <label for="fav-path-input" style="display:block; margin-bottom: 5px; color: var(--text-color); opacity: 0.8;">パス</label>
        <input type="text" id="fav-path-input" class="dialog-input" placeholder="ディレクトリパス">
      </div>
      <div class="dialog-buttons">
        <button id="fav-cancel-btn" class="dialog-btn cancel">キャンセル</button>
        <button id="fav-save-btn" class="dialog-btn primary">保存</button>
      </div>
    </div>
  </div>
</body>
</html>
