<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Veloce - AI Image Manager</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="border-overlay" style="display: none;"></div>
  <div data-tauri-drag-region class="titlebar">
    <div id="tab-container">
      <div id="new-tab-btn" class="new-tab-btn">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </div>
    </div>
    <div class="titlebar-controls">
      <div class="titlebar-button" id="titlebar-tab-list">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
      <div class="titlebar-divider"></div>
      <div class="titlebar-button" id="titlebar-minimize">
        <svg viewBox="0 0 10 1" width="10" height="1"><rect width="10" height="1" fill="currentColor"/></svg>
      </div>
      <div class="titlebar-button" id="titlebar-maximize">
        <svg viewBox="0 0 10 10" width="10" height="10"><rect width="10" height="10" fill="none" stroke="currentColor" stroke-width="1"/></svg>
      </div>
      <div class="titlebar-button titlebar-close" id="titlebar-close">
        <svg viewBox="0 0 10 10" width="10" height="10"><path d="M0,0 L10,10 M10,0 L0,10" stroke="currentColor" stroke-width="1"/></svg>
      </div>
    </div>
  </div>
  <div id="toolbar" class="toolbar">
    <button id="nav-back-btn" class="icon-btn" title="戻る (Alt+Left / マウス戻る)" disabled>
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
    </button>
    <button id="nav-forward-btn" class="icon-btn" title="進む (Alt+Right / マウス進む)" disabled>
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </button>
    <button id="nav-reload-btn" class="icon-btn toolbar-btn" title="再読み込み (F5)">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-refresh-cw"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
    <div class="control-divider"></div>
    <div id="search-container">
      <input type="text" id="search-bar" placeholder="検索 (ファイル名, プロンプト等 / カンマでAND検索)" spellcheck="false">
    </div>
    <button id="search-clear-btn" class="icon-btn"></button>
  </div>
  <!-- ブックマークバー (お気に入り) -->
  <div id="bookmark-bar">
    <div id="bookmark-list"></div>
    <button id="bookmark-overflow-btn" class="icon-btn" title="隠れたお気に入り" style="display: none;">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="m13 17 5-5-5-5"/>
        <path d="m6 17 5-5-5-5"/>
      </svg>
    </button>
  </div>
  <div class="app-content">
  <!-- 左ペイン: ディレクトリツリー等 -->
  <div id="left-pane">

    <div id="directories-section" tabindex="-1">
      <div id="dir-tree"></div>
    </div>
  </div>

  <div class="resizer" id="resizer-left"></div>

  <!-- 中央ペイン: リストとグリッド -->
  <div id="center-pane">
	<div id="center-top" tabindex="-1">
	  <table id="file-table">
		<thead>
		  <tr>
			<th data-sort="name">名前</th>
			<th data-sort="ext">拡張子</th>
			<th data-sort="width">幅</th>
			<th data-sort="height">高さ</th>
			<th data-sort="ratio">比率</th>
			<th data-sort="size">サイズ</th>
			<th data-sort="mtime">更新日時</th>
		  </tr>
		</thead>
		<tbody id="file-list-body"></tbody>
	  </table>
	</div>
	<div class="resizer-h" id="resizer-center"></div>
	<div id="thumbnail-controls">
	  <label for="thumbnail-size-slider">サムネイル:</label>
	  <input type="range" id="thumbnail-size-slider" min="100" max="500" value="120">
	  <div class="control-divider"></div>
	  <button id="open-cache-btn" class="icon-btn" title="キャッシュフォルダを開く">
	    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
	      <path d="M2 20V5a2 2 0 0 1 2-2h4l2 2h10a2 2 0 0 1 2 2v3"></path>
	      <path d="M2 14h20l-2 6H4z"></path>
	    </svg>
	  </button>
	  <button id="clear-cache-btn" class="icon-btn" title="キャッシュ(サムネイル・メタデータ)をクリア">
	    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
	      <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path>
	      <path d="M22 21H7"></path>
	      <path d="m5 11 9 9"></path>
	    </svg>
	  </button>
	</div>
	<div id="center-bottom" class="thumbnail-grid" tabindex="-1"></div>
  </div>

  <div class="resizer" id="resizer-right"></div>

  <!-- 右ペイン: インスペクター -->
  <div id="right-pane">

    <div id="inspector-section" tabindex="-1">
      <div id="inspector-content" class="inspector-data">
        <div id="inspector-empty" class="empty-state-msg">
          <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:12px;"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
          <div style="font-size: 13px; letter-spacing: 0.5px;">画像を選択してタグを表示</div>
        </div>
      </div>
    </div>
  </div>
  </div>

  <script type="module" src="/preload.js"></script>
  <script type="module" src="/renderer-state.js"></script>
  <script type="module" src="/renderer-ui.js"></script>
  <script type="module" src="/renderer.js"></script>

  <script>
    // 右クリック時にイベント伝播が止められていても、キャプチャフェーズで強制的にツールチップを消す
    window.addEventListener('contextmenu', () => {
      document.querySelector('.custom-tooltip.show')?.classList.remove('show');
    }, true);
  </script>

  <!-- トースト通知用コンテナ -->
  <div id="toast-container"></div>

  <div id="diff-modal" class="modal">
    <div class="modal-content">
      <h2>プロンプト差分比較</h2>
      <div id="diff-container">
        </div>
    </div>
  </div>

  <div id="edit-favorite-modal" class="dialog-overlay">
    <div class="dialog-box">
      <div class="form-group">
        <div id="fav-icon-selector"></div>
      </div>
      <div class="form-group">
        <label for="fav-name-input" class="form-label">名前</label>
        <input type="text" id="fav-name-input" class="dialog-input" placeholder="表示名">
      </div>
      <div class="form-group last">
        <label for="fav-path-input" class="form-label">パス</label>
        <input type="text" id="fav-path-input" class="dialog-input" placeholder="ディレクトリパス">
      </div>
      <div class="dialog-buttons">
        <button id="fav-cancel-btn" class="dialog-btn cancel">キャンセル</button>
        <button id="fav-save-btn" class="dialog-btn primary">保存</button>
      </div>
    </div>
  </div>
</body>
</html>
